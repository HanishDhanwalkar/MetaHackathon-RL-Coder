<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeComplete — RL-Powered IDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep: #09090b;
            --bg-surface: #0f0f12;
            --bg-elevated: #16161a;
            --bg-card: #1a1a1f;
            --border-subtle: rgba(255,255,255,0.05);
            --border-hover: rgba(255,255,255,0.08);
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-violet: #8b5cf6;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --accent-white: rgba(255,255,255,0.9);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --header-h: 44px;
            --statusbar-h: 28px;
            --sidebar-w: 220px;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ─── */
        #header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-mark {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-mark::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: white;
            opacity: 0.9;
        }

        .logo-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .logo-tag {
            font-size: 9px;
            font-weight: 500;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(139,92,246,0.12);
            color: var(--accent-violet);
            letter-spacing: 0.3px;
        }

        .header-sep {
            width: 1px;
            height: 16px;
            background: var(--border-subtle);
        }

        .header-model {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .header-model .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-emerald);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header-model span { color: var(--text-secondary); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn {
            font-size: 10px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }

        .header-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-secondary);
            background: rgba(255,255,255,0.02);
        }

        /* ─── Main Layout ─── */
        #main-layout {
            display: flex;
            height: calc(100vh - var(--header-h) - var(--statusbar-h));
        }

        /* ─── Editor ─── */
        #editor-wrap {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        #editor {
            width: 100%;
            height: 100%;
        }

        /* ─── Right Sidebar ─── */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--bg-surface);
            border-left: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 8px;
            overflow-y: auto;
        }

        .side-section-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 4px 0;
            margin-top: 4px;
        }

        .side-section-label:first-child {
            margin-top: 0;
        }

        .side-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            transition: all 0.25s ease;
        }

        .side-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .card-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .card-indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .card-indicator.green { background: var(--accent-emerald); }
        .card-indicator.amber { background: var(--accent-amber); }
        .card-indicator.cyan { background: var(--accent-cyan); }
        .card-indicator.violet { background: var(--accent-violet); }

        .card-value {
            font-size: 18px;
            font-weight: 600;
            font-family: var(--font-mono);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .card-value.green { color: var(--accent-emerald); }
        .card-value.amber { color: var(--accent-amber); }
        .card-value.cyan { color: var(--accent-cyan); }
        .card-value.violet { color: var(--accent-violet); }

        .card-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 2px;
        }

        /* KG card special */
        .kg-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }

        .kg-row:not(:last-child) {
            border-bottom: 1px solid var(--border-subtle);
        }

        .kg-row-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .kg-row-value {
            font-size: 11px;
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Major sync animation */
        .side-card.major-sync {
            border-color: rgba(6,182,212,0.2);
            background: rgba(6,182,212,0.04);
        }

        /* Steps mini chart */
        .steps-bar {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 24px;
            margin-top: 6px;
        }

        .steps-bar .bar {
            flex: 1;
            min-width: 3px;
            max-width: 6px;
            background: rgba(139,92,246,0.3);
            border-radius: 1px;
            transition: height 0.3s ease;
        }

        .steps-bar .bar.active {
            background: var(--accent-violet);
        }

        /* ─── Status Bar ─── */
        #statusbar {
            height: var(--statusbar-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-muted);
        }

        .sb-left, .sb-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sb-item {
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .sb-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-emerald);
        }

        .sb-dot.error { background: var(--accent-rose); }

        #ghost-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        #ghost-indicator.active { color: var(--accent-emerald); }

        #ghost-indicator .spinner {
            width: 8px;
            height: 8px;
            border: 1.5px solid transparent;
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            display: none;
        }

        #ghost-indicator.loading .spinner {
            display: block;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Reward Toast ─── */
        #reward-toast {
            position: fixed;
            bottom: 40px;
            right: calc(var(--sidebar-w) + 16px);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-family: var(--font-mono);
            font-weight: 600;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            opacity: 0;
            transform: translateY(6px);
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            pointer-events: none;
            z-index: 100;
        }

        #reward-toast.show { opacity: 1; transform: translateY(0); }
        #reward-toast.positive { border-color: rgba(16,185,129,0.25); color: var(--accent-emerald); }
        #reward-toast.negative { border-color: rgba(244,63,94,0.25); color: var(--accent-rose); }

        /* ─── Splash ─── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.4s, visibility 0.4s;
        }

        #splash.hidden { opacity: 0; visibility: hidden; }

        .splash-logo {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .splash-loader {
            width: 100px;
            height: 2px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            overflow: hidden;
        }

        .splash-loader::after {
            content: '';
            display: block;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet));
            border-radius: 2px;
            animation: loader-slide 1.2s ease-in-out infinite;
        }

        @keyframes loader-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .splash-sub {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Responsive: hide sidebar on small screens */
        @media (max-width: 768px) {
            #sidebar { display: none; }
            :root { --sidebar-w: 0px; }
        }
    </style>
</head>

<body>
    <!-- Splash -->
    <div id="splash">
        <div class="splash-logo">CodeComplete</div>
        <div class="splash-loader"></div>
        <div class="splash-sub">Initializing</div>
    </div>

    <!-- Header -->
    <div id="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-mark"></div>
                <span class="logo-text">CodeComplete</span>
                <span class="logo-tag">RL</span>
            </div>
            <div class="header-sep"></div>
            <div class="header-model">
                <div class="dot"></div>
                <span id="model-name">Qwen-72B</span>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" id="theme-toggle" title="Toggle minimap">Minimap</button>
        </div>
    </div>

    <!-- Main -->
    <div id="main-layout">
        <div id="editor-wrap">
            <div id="editor"></div>
        </div>

        <!-- Right Sidebar -->
        <div id="sidebar">
            <div class="side-section-label">RL Agent</div>

            <div class="side-card" id="rl-card">
                <div class="card-header">
                    <span class="card-label">EMA Reward</span>
                    <div class="card-indicator green"></div>
                </div>
                <div class="card-value green" id="rl-ema">—</div>
                <div class="card-sub" id="rl-trend">trend: —</div>
            </div>

            <div class="side-card" id="reward-card">
                <div class="card-header">
                    <span class="card-label">Last Reward</span>
                    <div class="card-indicator amber"></div>
                </div>
                <div class="card-value amber" id="reward-val">—</div>
            </div>

            <div class="side-section-label">Knowledge Graph</div>

            <div class="side-card" id="kg-card">
                <div class="kg-row">
                    <span class="kg-row-label">Symbols</span>
                    <span class="kg-row-value" id="kg-symbols">0</span>
                </div>
                <div class="kg-row">
                    <span class="kg-row-label">Imports</span>
                    <span class="kg-row-value" id="kg-imports">0</span>
                </div>
                <div class="kg-row">
                    <span class="kg-row-label">Syntax</span>
                    <span class="kg-row-value" id="kg-parse">—</span>
                </div>
            </div>

            <div class="side-section-label">Session</div>

            <div class="side-card">
                <div class="card-header">
                    <span class="card-label">Completions</span>
                    <div class="card-indicator violet"></div>
                </div>
                <div class="card-value violet" id="step-val">0</div>
                <div class="steps-bar" id="steps-chart"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="statusbar">
        <div class="sb-left">
            <div class="sb-item">
                <div class="sb-dot" id="parse-dot"></div>
                <span id="parse-status">Ready</span>
            </div>
            <div class="sb-item">Python</div>
            <div id="ghost-indicator">
                <div class="spinner"></div>
                <span id="ghost-label">Ghost text ready</span>
            </div>
        </div>
        <div class="sb-right">
            <div class="sb-item" id="cursor-pos">Ln 1, Col 1</div>
        </div>
    </div>

    <!-- Reward Toast -->
    <div id="reward-toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {

            /* ── DOM refs ── */
            const splash      = document.getElementById('splash');
            const rlEma       = document.getElementById('rl-ema');
            const rlTrend     = document.getElementById('rl-trend');
            const rewardVal   = document.getElementById('reward-val');
            const kgSymbols   = document.getElementById('kg-symbols');
            const kgImports   = document.getElementById('kg-imports');
            const kgParse     = document.getElementById('kg-parse');
            const kgCard      = document.getElementById('kg-card');
            const parseDot    = document.getElementById('parse-dot');
            const parseStatus = document.getElementById('parse-status');
            const ghostInd    = document.getElementById('ghost-indicator');
            const ghostLabel  = document.getElementById('ghost-label');
            const cursorPos   = document.getElementById('cursor-pos');
            const stepVal     = document.getElementById('step-val');
            const stepsChart  = document.getElementById('steps-chart');
            const rewardToast = document.getElementById('reward-toast');
            const themeToggle = document.getElementById('theme-toggle');

            let syncTimer  = null;
            let reqGen     = 0;
            let steps      = 0;
            let toastTimer = null;
            let rewardHistory = [];

            /* ── Helpers ── */
            function clipGhost(text) {
                if (!text) return '';
                const lines = String(text).replace(/\r\n/g, '\n').split('\n');
                return lines.length > 4 ? lines.slice(0, 4).join('\n') + '\n…' : text;
            }

            function showToast(reward) {
                if (reward == null) return;
                const r = parseFloat(reward);
                rewardToast.textContent = (r >= 0 ? '+' : '') + r.toFixed(2);
                rewardToast.className = 'show ' + (r >= 0.5 ? 'positive' : r < 0.2 ? 'negative' : '');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => { rewardToast.className = ''; }, 2000);
            }

            function updateStepsChart(reward) {
                rewardHistory.push(reward);
                if (rewardHistory.length > 20) rewardHistory.shift();
                stepsChart.innerHTML = '';
                rewardHistory.forEach((r, i) => {
                    const bar = document.createElement('div');
                    bar.className = 'bar' + (i === rewardHistory.length - 1 ? ' active' : '');
                    bar.style.height = Math.max(2, Math.min(24, r * 24)) + 'px';
                    stepsChart.appendChild(bar);
                });
            }

            /* ── Knowledge Graph Sync ── */
            async function syncKnowledgeGraph(content) {
                try {
                    const r = await fetch('/workspace/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content })
                    });
                    const j = await r.json();
                    const sy = j.symbol_count != null ? j.symbol_count : 0;
                    const im = j.import_count != null ? j.import_count : 0;
                    kgSymbols.textContent = sy;
                    kgImports.textContent = im;

                    if (j.valid_parse) {
                        kgParse.textContent = 'Valid';
                        kgParse.style.color = 'var(--accent-emerald)';
                        parseDot.className = 'sb-dot';
                        parseStatus.textContent = 'Valid';
                    } else {
                        kgParse.textContent = 'Error';
                        kgParse.style.color = 'var(--accent-rose)';
                        parseDot.className = 'sb-dot error';
                        parseStatus.textContent = 'Syntax error';
                    }

                    if (j.major_changed) {
                        kgCard.classList.add('major-sync');
                        setTimeout(() => kgCard.classList.remove('major-sync'), 1500);
                    }
                } catch (e) {
                    kgParse.textContent = '—';
                }
            }

            /* ── Monaco Theme ── */
            monaco.editor.defineTheme('minimal-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '4a4a52', fontStyle: 'italic' },
                    { token: 'keyword', foreground: 'b794f6' },
                    { token: 'string', foreground: '7dd3a8' },
                    { token: 'number', foreground: 'e2b456' },
                    { token: 'type', foreground: '7db8f2' },
                    { token: 'delimiter', foreground: '6b6b73' },
                    { token: 'identifier', foreground: 'c9c9cf' },
                ],
                colors: {
                    'editor.background':                '#09090b',
                    'editor.foreground':                '#d4d4d8',
                    'editor.lineHighlightBackground':   '#12121580',
                    'editor.selectionBackground':       '#2a2a3080',
                    'editorCursor.foreground':           '#a78bfa',
                    'editorLineNumber.foreground':       '#27272a',
                    'editorLineNumber.activeForeground': '#52525b',
                    'editor.inactiveSelectionBackground':'#18181b',
                    'editorIndentGuide.background':      '#18181b',
                    'editorIndentGuide.activeBackground':'#27272a',
                    'editorGhostText.foreground':        '#3f3f46',
                    'scrollbarSlider.background':        '#27272a40',
                    'scrollbarSlider.hoverBackground':   '#27272a80',
                }
            });

            /* ── Create Editor ── */
            const editor = monaco.editor.create(document.getElementById('editor'), {
                value: [
                    '# CodeComplete — RL-powered code completion',
                    '# Start typing to see inline suggestions',
                    '',
                    'def add(a, b):',
                    '    return ',
                    '',
                ].join('\n'),
                language: 'python',
                theme: 'minimal-dark',
                automaticLayout: true,
                fontSize: 13,
                fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
                fontLigatures: true,
                lineHeight: 21,
                padding: { top: 14 },
                minimap: { enabled: false },
                scrollbar: { verticalScrollbarSize: 6, horizontalScrollbarSize: 6 },
                renderLineHighlight: 'line',
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on',
                smoothScrolling: true,
                bracketPairColorization: { enabled: true },
                guides: { bracketPairs: false, indentation: true },
                inlineSuggest: { enabled: true },
                quickSuggestions: { other: false, comments: false, strings: false },
                suggestOnTriggerCharacters: false,
                wordBasedSuggestions: 'off',
                overviewRulerLanes: 0,
                hideCursorInOverviewRuler: true,
                overviewRulerBorder: false,
                renderWhitespace: 'none',
                glyphMargin: false,
                folding: true,
                lineDecorationsWidth: 8,
                lineNumbersMinChars: 3,
            });

            // Minimap toggle
            let minimapOn = false;
            themeToggle.addEventListener('click', () => {
                minimapOn = !minimapOn;
                editor.updateOptions({ minimap: { enabled: minimapOn } });
                themeToggle.style.color = minimapOn ? 'var(--accent-violet)' : '';
                themeToggle.style.borderColor = minimapOn ? 'rgba(139,92,246,0.3)' : '';
            });

            // Initial sync
            syncKnowledgeGraph(editor.getValue());

            // Debounced KG sync
            editor.onDidChangeModelContent(() => {
                const text = editor.getValue();
                if (syncTimer) clearTimeout(syncTimer);
                syncTimer = setTimeout(() => syncKnowledgeGraph(text), 400);
            });

            // Cursor tracking
            editor.onDidChangeCursorPosition(e => {
                cursorPos.textContent = 'Ln ' + e.position.lineNumber + ', Col ' + e.position.column;
            });

            /* ── Inline Completions ── */
            monaco.languages.registerInlineCompletionsProvider('python', {
                provideInlineCompletions: async (model, position, context, token) => {
                    const id = ++reqGen;
                    ghostInd.className = 'loading';
                    ghostLabel.textContent = 'Thinking…';

                    await new Promise(r => setTimeout(r, 200));
                    if (token.isCancellationRequested || id !== reqGen) {
                        ghostInd.className = '';
                        ghostLabel.textContent = 'Ghost text ready';
                        return { items: [] };
                    }

                    const offset = model.getOffsetAt(position);
                    let data;
                    try {
                        const response = await fetch('/predict', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: model.getValue(), cursor_offset: offset })
                        });
                        data = await response.json();
                    } catch (e) {
                        ghostInd.className = '';
                        ghostLabel.textContent = 'Ghost text ready';
                        return { items: [] };
                    }

                    if (token.isCancellationRequested || id !== reqGen) {
                        ghostInd.className = '';
                        ghostLabel.textContent = 'Ghost text ready';
                        return { items: [] };
                    }

                    // Update RL stats in sidebar
                    if (data.rl_ema_reward != null) {
                        const ema = parseFloat(data.rl_ema_reward).toFixed(3);
                        const trend = data.rl_trend != null ? parseFloat(data.rl_trend).toFixed(3) : '0.000';
                        const trendNum = parseFloat(trend);
                        const arrow = trendNum > 0 ? '↑' : trendNum < 0 ? '↓' : '→';
                        rlEma.textContent = ema;
                        rlTrend.textContent = 'trend: ' + trend + ' ' + arrow;
                        rlTrend.style.color = trendNum > 0 ? 'var(--accent-emerald)' : trendNum < 0 ? 'var(--accent-rose)' : '';
                    }

                    // Update reward
                    if (data.reward != null) {
                        const r = parseFloat(data.reward);
                        rewardVal.textContent = r.toFixed(2);
                        showToast(data.reward);
                        updateStepsChart(r);
                    }

                    // Update step counter
                    steps++;
                    stepVal.textContent = steps;

                    ghostInd.className = 'active';
                    ghostLabel.textContent = 'Suggestion ready';
                    setTimeout(() => {
                        ghostInd.className = '';
                        ghostLabel.textContent = 'Ghost text ready';
                    }, 1200);

                    const ghost = clipGhost(data.completion || '');
                    if (!ghost) return { items: [] };

                    return {
                        items: [{
                            insertText: ghost,
                            range: new monaco.Range(
                                position.lineNumber, position.column,
                                position.lineNumber, position.column
                            )
                        }]
                    };
                }
            });

            /* ── Hide splash ── */
            setTimeout(() => splash.classList.add('hidden'), 700);
        });
    </script>
</body>

</html>
