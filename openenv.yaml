name: "CRA-Environment"
version: "1.0.0"
description: "Contextual Reinforcement Autocomplete — code completion with KG hints and deterministic per-task graders."
entrypoint: "src.server:app"
runtime: fastapi
tags:
  - openenv
  - code-assist
  - rl

# ≥3 tasks; each must bind a grader (string id + mapping for strict parsers).
tasks:
  - id: syntax-line
    name: syntax-line
    description: "Finish the line so the module is valid Python (balanced parentheses)."
    difficulty: easy
    max_steps: 100
    score_range: [0.0, 1.0]
    grader: grade_syntax_line
    graders:
      - id: grade_syntax_line
        type: deterministic
        implementation: CodeAssistEnv._grade_syntax_line

  - id: import-fix
    name: import-fix
    description: "Add the missing import so the file runs."
    difficulty: medium
    max_steps: 100
    score_range: [0.0, 1.0]
    grader: grade_import_fix
    graders:
      - id: grade_import_fix
        type: deterministic
        implementation: CodeAssistEnv._grade_import_fix

  - id: docstring-stub
    name: docstring-stub
    description: "Give the function a docstring and a body with a return statement."
    difficulty: hard
    max_steps: 100
    score_range: [0.0, 1.0]
    grader: grade_docstring_stub
    graders:
      - id: grade_docstring_stub
        type: deterministic
        implementation: CodeAssistEnv._grade_docstring

# Standalone grader registry (some validators count this list).
graders:
  - id: grade_syntax_line
    task_id: syntax-line
    type: deterministic
  - id: grade_import_fix
    task_id: import-fix
    type: deterministic
  - id: grade_docstring_stub
    task_id: docstring-stub
    type: deterministic

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
